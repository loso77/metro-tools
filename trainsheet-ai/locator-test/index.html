<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>车表定位测试</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">TRAIN SHEET LOCATOR</p>
        <h1>车表定位测试</h1>
        <p>先确认31–61每一行的车号、股道位置，不进行文字识别。</p>
      </div>
      <a href="../" class="back">返回正式版</a>
    </header>

    <section class="card intro">
      <strong>操作方法</strong>
      <ol>
        <li>选择或拍摄车表照片。</li>
        <li>等待自动定位；如果不准，拖动四个圆点到“31行顶部”和“61行底部”的四角。</li>
        <li>点击任意一行，核对下方放大的车号与股道区域。</li>
      </ol>
      <label class="upload">
        选择车表照片
        <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp">
      </label>
    </section>

    <section id="workspace" class="card hidden">
      <div class="section-head">
        <div>
          <h2>目标区域</h2>
          <p id="status" class="status">正在准备照片……</p>
        </div>
        <span id="confidence" class="confidence">未检测</span>
      </div>

      <div class="toolbar">
        <button id="autoBtn" type="button" class="primary">重新自动定位</button>
        <button id="defaultBtn" type="button">使用默认框</button>
        <button id="resetBtn" type="button">恢复上次定位</button>
      </div>

      <div class="edge-tools" aria-label="行边界微调">
        <strong>按整行微调边界</strong>
        <div>
          <button id="topUp" type="button">31上边 ↑</button>
          <button id="topDown" type="button">31上边 ↓</button>
          <button id="bottomUp" type="button">61下边 ↑</button>
          <button id="bottomDown" type="button">61下边 ↓</button>
        </div>
      </div>

      <div id="stage" class="stage">
        <canvas id="photoCanvas"></canvas>
      </div>

      <div class="legend">
        <span><i class="dot corner"></i>可拖动四角</span>
        <span><i class="dot train"></i>车号区域</span>
        <span><i class="dot track"></i>股道区域</span>
      </div>

      <details class="column-settings">
        <summary>列边界微调</summary>
        <label>
          <span>车号列起点 <b id="carStartValue">30%</b></span>
          <input id="carStart" type="range" min="20" max="45" value="30">
        </label>
        <label>
          <span>股道列起点 <b id="trackStartValue">64%</b></span>
          <input id="trackStart" type="range" min="50" max="82" value="64">
        </label>
      </details>
    </section>

    <section id="rowCard" class="card hidden">
      <div class="section-head">
        <div>
          <p class="eyebrow">ROW PREVIEW</p>
          <h2 id="rowTitle">表号31</h2>
          <p>放大区域从车号列起点到股道列末端；中间分界线左侧为车号，右侧为股道。</p>
        </div>
        <button id="previousRow" type="button" aria-label="上一行">↑</button>
        <button id="nextRow" type="button" aria-label="下一行">↓</button>
      </div>
      <div class="crop-wrap">
        <canvas id="cropCanvas"></canvas>
        <div id="cropDivider" class="crop-divider"></div>
      </div>
      <p id="rowHint" class="row-hint"></p>
    </section>

    <footer>测试版不会上传照片，也不会调用大模型。</footer>
  </main>
  <script type="module" src="./locator.js"></script>
</body>
</html>
